services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: goodstrata
      POSTGRES_PASSWORD: goodstrata
      POSTGRES_DB: goodstrata
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodstrata"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
