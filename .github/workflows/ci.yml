name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: goodstrata
          POSTGRES_PASSWORD: goodstrata
          POSTGRES_DB: goodstrata
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U goodstrata"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
        env:
          TEST_DATABASE_URL: postgres://goodstrata:goodstrata@localhost:5434/goodstrata

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: goodstrata
          POSTGRES_PASSWORD: goodstrata
          POSTGRES_DB: goodstrata
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U goodstrata"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @goodstrata/web exec playwright install --with-deps chromium
      - name: E2E
        run: pnpm --filter @goodstrata/web test:e2e
        env:
          TEST_DATABASE_URL: postgres://goodstrata:goodstrata@localhost:5434/goodstrata
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/

  # Opt-in live-LLM evals (nightly / manual) land with the eval harness slice.
