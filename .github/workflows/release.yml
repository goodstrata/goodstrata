name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Self-host image: ghcr.io/goodstrata/goodstrata
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/goodstrata/goodstrata:latest
            ghcr.io/goodstrata/goodstrata:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Launch site → Workers static assets (goodstrata.com.au / www).
  # Requires repo secrets CLOUDFLARE_API_TOKEN (Workers Scripts:Edit) and
  # CLOUDFLARE_ACCOUNT_ID; the job skips gracefully until they exist.
  site:
    runs-on: ubuntu-latest
    env:
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        if: env.HAS_CF_TOKEN == 'true'
      - uses: cloudflare/wrangler-action@v3
        if: env.HAS_CF_TOKEN == 'true'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deploy/site-worker
          command: deploy
      - if: env.HAS_CF_TOKEN != 'true'
        run: echo "CLOUDFLARE_API_TOKEN secret not set — skipping site deploy."
